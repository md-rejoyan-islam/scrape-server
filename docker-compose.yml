services:
  scraper:
    build: .
    container_name: scrape-server
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    shm_size: "1gb"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3000}/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
